services:
  - type: web
    name: skill-tree-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Render ダッシュボードで個別に設定
      - key: CORS_ORIGINS
        sync: false  # Pages の URL が確定したら設定
