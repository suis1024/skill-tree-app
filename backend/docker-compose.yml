services:
  db:
    image: postgres:16
    container_name: skill-tree-db
    environment:
      POSTGRES_USER: skilltree
      POSTGRES_PASSWORD: skilltree
      POSTGRES_DB: skilltree
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
